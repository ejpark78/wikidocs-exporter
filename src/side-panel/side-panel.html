<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WikiDocs Exporter</title>
  <link rel="stylesheet" href="side-panel.css">
</head>
<body>
  <div class="sidebar">
    <header class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">📚</span>
        <h1>WikiDocs Exporter</h1>
      </div>
      <button id="collapse-btn" class="collapse-btn" title="접기">
        <span>›</span>
      </button>
    </header>

    <main class="sidebar-content">
      <section id="page-info-section" class="section">
        <h2 class="section-title">📄 현재 페이지</h2>
        <div class="page-info" id="page-info">
          <p class="empty-state">위키독스 페이지를 열어주세요</p>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">⚙️ 설정</h2>
        
        <div class="option-group">
          <label class="option-label">스크랩 간격</label>
          <div class="slider-group">
            <input type="range" id="scrape-delay" class="delay-slider" min="0" max="15" value="3">
            <span id="scrape-delay-value" class="delay-value">3초</span>
          </div>
        </div>

        <div class="option-group">
          <label class="option-label">내보내기 대상</label>
          <div class="radio-group">
            <label class="radio-item">
              <input type="radio" name="target" value="obsidian" checked>
              <span class="radio-check"></span>
              <span>💎 Obsidian</span>
            </label>
            <label class="radio-item">
              <input type="radio" name="target" value="joplin">
              <span class="radio-check"></span>
              <span>📒 Joplin</span>
            </label>
          </div>
        </div>

        <div class="option-group">
          <label class="checkbox-item">
            <input type="checkbox" id="include-images" checked>
            <span class="checkbox-check"></span>
            <span>이미지 포함</span>
          </label>
        </div>

        <div class="option-group">
          <label class="checkbox-item">
            <input type="checkbox" id="add-frontmatter" checked>
            <span class="checkbox-check"></span>
            <span>YAML Frontmatter 추가</span>
          </label>
        </div>

        <div class="option-group">
          <label class="checkbox-item">
            <input type="checkbox" id="create-index" checked>
            <span class="checkbox-check"></span>
            <span>인덱스 파일 생성</span>
          </label>
        </div>

        <div id="joplin-token-section" class="option-group hidden">
          <label class="option-label">Joplin API 토큰</label>
          <div class="token-input-group">
            <input type="password" id="joplin-token" class="token-input" placeholder="토큰을 입력하세요">
            <button id="save-token-btn" class="btn btn-small">저장</button>
          </div>
          <small class="help-text">
            Joplin → 도구 → 웹 클리퍼 → API 토큰에서 복사
          </small>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">📥 작업</h2>
        <div class="button-group">
          <button id="scrape-btn" class="btn btn-primary">
            <span>🔍</span> 스크랩 시작
          </button>
          <button id="stop-btn" class="btn btn-warning hidden">
            <span>⏹️</span> 중단
          </button>
        </div>
        <div id="status-section" class="status-section">
          <div class="status-row">
            <div class="status-indicator" id="status-indicator"></div>
            <span class="status-text" id="status-text">대기 중</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="chapter-info" id="chapter-info"></div>
        </div>
      </section>

      <section id="result-section" class="section hidden">
        <h2 class="section-title">✅ 결과</h2>
        <div id="result-info"></div>
      </section>

      <section id="error-section" class="section hidden">
        <div class="error-card">
          <span class="error-icon">⚠️</span>
          <p id="error-message"></p>
        </div>
      </section>
    </main>

    <footer class="sidebar-footer">
      <small>WikiDocs → Obsidian/Joplin</small>
    </footer>
  </div>

  <script src="side-panel.js"></script>
</body>
</html>
